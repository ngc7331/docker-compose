services:
  app:
    container_name: portainer
    image: ${DOCKER_MIRROR:-docker.io}/${DOCKER_IMAGE:-portainer/portainer-ee}:${DOCKER_TAG:-latest}
    privileged: true
    restart: always
    networks:
      - default
    volumes:
      - data:/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - TZ
      - PUID
      - PGID

volumes:
  data:

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK:-br}
