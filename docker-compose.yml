services:
  app:
    container_name: couchdb
    image: ${DOCKER_MIRROR:-docker.io}/${DOCKER_IMAGE:-couchdb}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    networks:
      - default
    volumes:
      - config:/opt/couchdb/etc:rw
      - data:/opt/couchdb/data:rw
    environment:
      - TZ
      - PUID
      - PGID
      - COUCHDB_USER
      - COUCHDB_PASSWORD

volumes:
  config:
  data:

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK:-br}
