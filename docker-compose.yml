version: '3'
services:
  app:
    container_name: hath
    image: ${DOCKER_MIRROR:-docker.io}/ngc7331/hath:latest
    restart: unless-stopped
    networks:
      - br
    ports:
      - ${PORT_HATH:-9996}:${PORT_HATH:-9996}/tcp
    volumes:
      - data:/data:rw
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
      - HATH_CLIENT_ID
      - HATH_CLIENT_KEY

volumes:
  data:

networks:
  br:
    external: true
