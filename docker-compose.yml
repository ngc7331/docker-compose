services:
  app:
    container_name: uptime-kuma
    image: ${DOCKER_MIRROR:-docker.io}/${DOCKER_IMAGE:-louislam/uptime-kuma}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    networks:
      - default
    volumes:
      - data:/app/data:rw
    environment:
      - TZ
      - PUID
      - PGID

volumes:
  data:

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK:-br}
