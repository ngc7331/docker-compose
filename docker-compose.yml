version: '3'
services:
  app:
    container_name: wxbot
    image: ${DOCKER_MIRROR:-docker.io}/ngc7331/wxbot:latest
    restart: unless-stopped
    networks:
      - br
    volumes:
      - config:/config:rw
      - data:/data:rw
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
      - BOT_NAME=bot
      - BOT_DATA=/data
      - BOT_LOGLEVEL=info
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=3233
      - WEBHOOK_TOKEN

volumes:
  config:
  data:

networks:
  br:
    external: true
