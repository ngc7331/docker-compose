version: '3'
services:
  app:
    container_name: frps
    image: ${DOCKER_MIRROR:-docker.io}/ngc7331/frps:latest
    restart: unless-stopped
    networks:
      - br
    ports:
      - 7000:7000/tcp
      - 7500:7500/tcp
      - 57000-57100:57000-57100/tcp
      - 57000-57100:57000-57100/udp
    volumes:
      - config:/config:rw
    environment:
      - TZ=Asia/Shanghai
      - PUID
      - PGID
      - AUTH_TOKEN
      - WEBUI_USER
      - WEBUI_PASS

volumes:
  config:

networks:
  br:
    external: true
